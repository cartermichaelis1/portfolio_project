{% extends "base.html" %}

{% block title %}404 — Page Not Found | Carter Michaelis{% endblock %}

{% block extra_css %}
<style>
  .error-section {
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 1rem;
  }
  .error-code {
    font-size: clamp(5rem, 18vw, 9rem);
    font-weight: 900;
    color: #e9ecef;
    line-height: 1;
    letter-spacing: -4px;
    margin-bottom: 0;
  }
  .error-title {
    font-size: 1.8rem;
    font-weight: 800;
    color: #0d1b2a;
    margin-top: .5rem;
    margin-bottom: .75rem;
  }
  .error-text {
    color: #6c757d;
    font-size: 1rem;
    max-width: 420px;
    margin: 0 auto 2rem;
    line-height: 1.7;
  }
  .btn-home {
    background: #0d1b2a;
    color: #fff;
    font-weight: 700;
    padding: .7rem 2rem;
    border-radius: 4px;
    text-decoration: none;
    font-size: .95rem;
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    transition: background .2s;
  }
  .btn-home:hover { background: #1b2d45; color: #fff; }
  .accent-bar {
    width: 50px;
    height: 4px;
    background: #4ea8de;
    border-radius: 2px;
    margin: 1rem auto;
  }
</style>
{% endblock %}

{% block content %}
<section class="error-section">
  <div>
    <p class="error-code">404</p>
    <div class="accent-bar"></div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-text">
      The page you're looking for doesn't exist or may have been moved.
      Let's get you back on track.
    </p>
    <a href="{% url 'home' %}" class="btn-home">
      <i class="bi bi-arrow-left"></i> Back to Home
    </a>
  </div>
</section>
{% endblock %}
