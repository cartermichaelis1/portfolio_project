<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Portfolio{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    :root {
      --navy: #0d1b2a;
      --navy-light: #1b2d45;
      --accent: #4ea8de;
    }

    body {
      background-color: #f8f9fa;
      color: #212529;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background-color: var(--navy) !important;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.3rem;
      color: #ffffff !important;
      letter-spacing: .5px;
    }

    .nav-link {
      color: rgba(255,255,255,.85) !important;
      font-weight: 500;
      padding: .5rem .9rem !important;
      transition: color .2s;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--accent) !important;
    }

    .navbar-toggler {
      border-color: rgba(255,255,255,.3);
    }

    .navbar-toggler-icon {
      filter: invert(1);
    }

    /* ── Main content ── */
    main {
      flex: 1;
    }

    /* ── Footer ── */
    footer {
      background-color: var(--navy);
      color: rgba(255,255,255,.75);
      padding: 1.25rem 0;
      font-size: .9rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}">MyPortfolio</a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#mainNav"
              aria-controls="mainNav" aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'about' %}">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'projects' %}">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'skills' %}">Skills</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'resume' %}">Resume</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'contact' %}">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Page content ── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ── -->
  <footer>
    <div class="container text-center">
      <p class="mb-0">
        &copy; <span id="year"></span> [Your Name] &mdash; Built with
        <a href="https://www.djangoproject.com/" target="_blank" rel="noopener">Django</a>
      </p>
    </div>
  </footer>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  {% block extra_js %}{% endblock %}
</body>
</html>
